<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đếm Click + IP</title>

<style>
body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
}

.box{
background:white;
padding:20px;
border-radius:10px;
max-width:700px;
margin:auto;
box-shadow:0 0 15px rgba(0,0,0,0.1);
}

#count{
font-size:40px;
color:#007bff;
margin:10px 0;
}

button{
padding:10px 20px;
font-size:16px;
background:#007bff;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

.list{
margin-top:20px;
max-height:300px;
overflow:auto;
background:#f9f9f9;
padding:10px;
border-radius:8px;
}

.item{
padding:5px;
border-bottom:1px solid #eee;
font-size:14px;
}
</style>
</head>

<body>

<div class="box">
<h2>Tổng click toàn server</h2>
<div id="count">0</div>

<button onclick="clickAdd()">Click</button>

<h3>Danh sách IP click</h3>
<div class="list" id="list"></div>

</div>

<script>

async function load(){
let res = await fetch("/get");
let data = await res.json();

document.getElementById("count").innerText = data.count;

let html = "";
data.clicks.slice().reverse().forEach(c=>{
html += `<div class="item">${c.ip} - ${c.time}</div>`;
});

document.getElementById("list").innerHTML = html;
}

async function clickAdd(){
await fetch("/click",{method:"POST"});
load();
}

load();

</script>

</body>
</html>
