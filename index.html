<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bán tài khoản Facebook</title>

<style>
*{
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
margin:0;
background:#f5f5f5;
border-radius:14px;
overflow-x:hidden;
}

.header{
width:100%;
background:#eee;
text-align:center;
padding:18px;
font-size:22px;
font-weight:bold;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 15px;
}

.menu-btn{
font-size:24px;
cursor:pointer;
}

.user-area{
display:flex;
align-items:center;
gap:10px;
position:relative;
}

.avatar{
width:40px;
height:40px;
border-radius:50%;
cursor:pointer;
}

.hello{
font-size:14px;
}

.dropdown{
position:absolute;
right:0;
top:50px;
background:white;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
display:none;
flex-direction:column;
overflow:hidden;
}

.dropdown div{
padding:10px 20px;
border-bottom:1px solid #eee;
cursor:pointer;
}

.dropdown div:hover{
background:#f3f3f3;
}

.post{
background:white;
margin:20px;
padding:15px;
border-radius:12px;
display:flex;
justify-content:space-between;
align-items:center;
transition:0.2s;
}

.post:hover{
transform:translateY(-5px);
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.badge{
background:#e7f7ff;
padding:5px 10px;
border-radius:6px;
margin-top:5px;
display:inline-block;
border:1px solid #00aaff;
}

.buy{
background:red;
color:white;
border:none;
padding:10px 20px;
border-radius:8px;
cursor:pointer;
}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
display:none;
justify-content:center;
align-items:center;
z-index:999;
}

.popup-box{
background:white;
padding:20px;
border-radius:12px;
min-width:300px;
position:relative;
}

.close{
position:absolute;
right:10px;
top:10px;
cursor:pointer;
border:1px solid #ccc;
padding:2px 8px;
border-radius:6px;
}

.close:hover{
background:red;
color:white;
}

input{
width:100%;
padding:10px;
margin:5px 0;
border:1px solid #ddd;
border-radius:6px;
}

.btn-red{
background:red;
color:white;
padding:10px;
border:none;
border-radius:6px;
width:100%;
cursor:pointer;
}

.side-menu{
position:fixed;
left:-260px;
top:0;
width:250px;
height:100%;
background:white;
box-shadow:0 0 10px rgba(0,0,0,0.3);
transition:0.3s;
z-index:1000;
padding-top:20px;
}

.side-menu div{
padding:15px;
border-bottom:1px solid #eee;
cursor:pointer;
}

.side-menu div:hover{
background:#f3f3f3;
}

.loader{
position:fixed;
width:100%;
height:100%;
background:white;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:2000;
}

.bar{
width:200px;
height:8px;
background:#eee;
margin-top:10px;
border-radius:10px;
overflow:hidden;
}

.bar div{
height:100%;
width:0%;
background:red;
}

</style>
</head>

<body>

<div class="loader" id="loader">
<img src="https://d2eioyamun8mp1.cloudfront.net/images/1775119223712_rUa3GTUcQ0.jpg" width="120">
<div class="bar"><div id="progress"></div></div>
</div>

<div class="header">bán tài khoản facebook</div>

<div class="topbar">

<div class="menu-btn" onclick="openMenu()">☰</div>

<div class="user-area">
<div class="hello" id="hello">Xin chào, khách</div>

<img class="avatar" onclick="toggleUser()" src="https://d2eioyamun8mp1.cloudfront.net/images/1775110178008_od0kbCwWky.jpg">

<div class="dropdown" id="dropdown"></div>

</div>
</div>

<div class="post">
<div>
<div>TÀI KHOẢN TẠO 2 THÁNG, 1K-2KFR, 2FA, MAIL NHẬN ĐƯỢC CODE</div>
<div class="badge">Số lượng: 10</div>
<div class="badge">Giá: 10000đ</div>
</div>

<button class="buy" onclick="buy()">Mua ngay</button>
</div>


<!-- login -->
<div class="popup" id="loginPopup">
<div class="popup-box">

<div class="close" onclick="closePopup('loginPopup')">X</div>

<input id="user" placeholder="name user">
<input id="pass" placeholder="pass" type="password">

<button class="btn-red" onclick="login()">Đăng nhập</button>

<div style="margin-top:5px;cursor:pointer">Đăng kí</div>

</div>
</div>


<!-- buy -->
<div class="popup" id="buyPopup">
<div class="popup-box">

<div class="close" onclick="closePopup('buyPopup')">X</div>

<div>TÀI KHOẢN TẠO 2 THÁNG, 1K-2KFR, 2FA, MAIL NHẬN ĐƯỢC CODE</div>

<br>

<div>Số lượng cần mua</div>
<input id="qty" type="number" value="1" oninput="calc()">

<div>Thành tiền: <span id="total">10000</span>đ</div>

<button class="btn-red">Thanh toán</button>

</div>
</div>


<div class="side-menu" id="menu">
<div onclick="location.reload()">Trang chủ</div>
<div onclick="alert('TÍNH NĂNG SẼ ĐƯỢC ADMIN UPDATE SAU')">Nạp tiền</div>
<div onclick="support()">Hỗ trợ</div>
<div onclick="history()">Lịch sử giao dịch</div>
</div>


<script>

let logged=false

function toggleUser(){
let d=document.getElementById("dropdown")
d.style.display=d.style.display=="flex"?"none":"flex"
d.innerHTML=""

if(logged){
d.innerHTML=`
<div>Cập nhật thông tin</div>
<div>Nạp tiền</div>
<div onclick="logout()">Đăng xuất</div>
`
}else{
d.innerHTML=`
<div onclick="showLogin()">Đăng nhập</div>
<div>Đăng kí</div>
`
}
}

function showLogin(){
document.getElementById("loginPopup").style.display="flex"
}

function closePopup(id){
document.getElementById(id).style.display="none"
}

function login(){
let u=document.getElementById("user").value
let p=document.getElementById("pass").value

if(u=="admin" && p=="admin"){
document.cookie="user="+u
loading()
}else{
alert("sai tài khoản hoặc mật khẩu")
}
}

function loading(){
document.getElementById("loader").style.display="flex"

let i=0
let bar=document.getElementById("progress")

let t=setInterval(()=>{
i+=5
bar.style.width=i+"%"
if(i>=100){
clearInterval(t)
location.reload()
}
},80)
}

window.onload=function(){
let c=document.cookie

if(c.includes("user=")){
logged=true
let u=c.split("user=")[1]
document.getElementById("hello").innerText="Xin chào, "+u
}
}

function logout(){
document.cookie="user=;"
location.reload()
}

function openMenu(){
document.getElementById("menu").style.left="0"
}

document.onclick=function(e){
if(!e.target.closest(".menu-btn")){
document.getElementById("menu").style.left="-260px"
}
}

function buy(){
document.getElementById("buyPopup").style.display="flex"
calc()
}

function calc(){
let q=document.getElementById("qty").value
document.getElementById("total").innerText=q*10000
}

function support(){
window.open("https://zalo.me/0347241585")
}

function history(){
alert("Chưa có lịch sử giao dịch nào")
}

</script>

</body>
</html>
