<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đếm lượt vào web</title>

<style>
body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
}

.box{
background:white;
padding:20px;
border-radius:10px;
max-width:700px;
margin:auto;
box-shadow:0 0 15px rgba(0,0,0,0.1);
}

#count{
font-size:40px;
color:#007bff;
margin:10px 0;
}

.list{
margin-top:20px;
max-height:300px;
overflow:auto;
background:#f9f9f9;
padding:10px;
border-radius:8px;
}

.item{
padding:5px;
border-bottom:1px solid #eee;
font-size:14px;
}
</style>
</head>

<body>

<div class="box">
<h2>Tổng lượt vào web</h2>
<div id="count">0</div>

<h3>Lịch sử IP</h3>
<div class="list" id="list"></div>

</div>

<script>

async function visit(){
let res = await fetch("/visit");
let data = await res.json();

document.getElementById("count").innerText = data.count;

let html = "";
data.visits.slice().reverse().forEach(v=>{
html += `<div class="item">${v.ip} - ${v.time}</div>`;
});

document.getElementById("list").innerHTML = html;
}

// tự chạy khi mở web
visit();

</script>

</body>
</html>
