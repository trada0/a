<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bán tài khoản facebook</title>

<style>
*{
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
margin:0;
background:#f5f5f5;
border-radius:12px;
overflow-x:hidden;
}

/* header */
.header{
background:#eee;
text-align:center;
padding:18px;
font-size:24px;
font-weight:bold;
width:100%;
border-bottom:1px solid #ddd;
}

/* top bar */
.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 15px;
}

.menu-btn{
font-size:26px;
cursor:pointer;
}

.avatar-area{
display:flex;
align-items:center;
gap:10px;
position:relative;
}

.avatar{
width:40px;
height:40px;
border-radius:50%;
cursor:pointer;
}

.username{
font-size:14px;
}

/* dropdown */
.dropdown{
position:absolute;
right:0;
top:50px;
background:white;
border:1px solid #ddd;
border-radius:8px;
display:none;
flex-direction:column;
min-width:160px;
z-index:50;
}

.dropdown div{
padding:10px;
border-bottom:1px solid #eee;
cursor:pointer;
}

.dropdown div:hover{
background:#f2f2f2;
}

/* sidebar */
.sidebar{
position:fixed;
left:0;
top:0;
width:250px;
height:100%;
background:white;
border-right:1px solid #ddd;
padding-top:80px;
display:none;
z-index:60;
}

.sidebar div{
padding:15px;
border:1px solid #ddd;
margin:8px;
border-radius:8px;
cursor:pointer;
}

.sidebar div:hover{
background:#eee;
}

/* post */
.post{
background:white;
margin:20px;
padding:15px;
border-radius:12px;
display:flex;
justify-content:space-between;
align-items:center;
transition:0.2s;
}

.post:hover{
transform:translateY(-5px);
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.post-left{
max-width:70%;
}

.tag{
border:1px solid #0aa;
color:#0aa;
padding:5px 8px;
border-radius:6px;
display:inline-block;
margin-top:6px;
}

.buy-btn{
background:red;
color:white;
border:none;
padding:10px 15px;
border-radius:8px;
cursor:pointer;
}

/* popup */
.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:20px;
border-radius:12px;
border:1px solid #ddd;
display:none;
z-index:100;
min-width:300px;
}

.close{
position:absolute;
top:8px;
right:10px;
cursor:pointer;
font-weight:bold;
}

.close:hover{
color:red;
}

/* overlay */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
display:none;
z-index:90;
}

/* login */
.input{
width:100%;
padding:8px;
border:1px solid #ddd;
border-radius:6px;
margin-bottom:8px;
}

.red{
background:red;
color:white;
border:none;
padding:10px;
border-radius:8px;
cursor:pointer;
width:100%;
}

/* loading */
.loading{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:200;
}

.bar{
width:250px;
height:8px;
background:#ddd;
margin-top:10px;
border-radius:6px;
overflow:hidden;
}

.bar-inner{
height:100%;
width:0%;
background:#00aaff;
}

</style>
</head>
<body>

<div class="header">bán tài khoản facebook</div>

<div class="topbar">
<div class="menu-btn" onclick="toggleMenu()">☰</div>

<div class="avatar-area">
<div class="username" id="hello">xin chào, khách</div>
<img class="avatar"
onclick="toggleAvatar()"
src="https://d2eioyamun8mp1.cloudfront.net/images/1775110178008_od0kbCwWky.jpg">

<div class="dropdown" id="avatarMenu"></div>
</div>
</div>

<!-- sidebar -->
<div class="sidebar" id="sidebar">
<div onclick="location.reload()">Trang chủ</div>
<div onclick="napTien()">Nạp tiền</div>
<div onclick="hoTro()">Hỗ trợ</div>
<div onclick="lichSu()">lịch sử giao dịch</div>
</div>

<!-- post -->
<div class="post">
<div class="post-left">
<div>TÀI KHOẢN TẠO 2 THÁNG, 1K-2KFR, 2FA, MAIL NHẬN ĐƯỢC CODE</div>
<div class="tag">Số lượng: 10</div>
<div class="tag">Giá: 10000đ</div>
</div>

<button class="buy-btn" onclick="mua()">mua ngay</button>
</div>

<!-- overlay -->
<div class="overlay" id="overlay"></div>

<!-- login popup -->
<div class="popup" id="loginPopup">
<div class="close" onclick="closeAll()">✖</div>
<input class="input" id="user" placeholder="name user">
<input class="input" id="pass" placeholder="pass" type="password">
<button class="red" onclick="login()">đăng nhập</button>
<div style="font-size:12px;margin-top:6px">đăng kí</div>
</div>

<!-- mua popup -->
<div class="popup" id="buyPopup">
<div class="close" onclick="closeAll()">✖</div>
<div>TÀI KHOẢN TẠO 2 THÁNG, 1K-2KFR, 2FA, MAIL NHẬN ĐƯỢC CODE</div>
<br>
Số lượng cần mua  
<input class="input" type="number" value="1" id="qty" oninput="tinh()">

<div id="total">Thành tiền: 10000đ</div>
<br>
<button class="red">thanh toán</button>
</div>

<!-- simple popup -->
<div class="popup" id="simplePopup">
<div class="close" onclick="closeAll()">✖</div>
<div id="simpleText"></div>
</div>

<!-- loading -->
<div class="loading" id="loading">
<img width="120"
src="https://d2eioyamun8mp1.cloudfront.net/images/1775119223712_rUa3GTUcQ0.jpg">
<div class="bar">
<div class="bar-inner" id="bar"></div>
</div>
</div>

<script>

let logged=false
let username=""

function toggleMenu(){
document.getElementById("sidebar").style.display="block"
document.getElementById("avatarMenu").style.display="none"
}

function toggleAvatar(){
let menu=document.getElementById("avatarMenu")
menu.innerHTML=""

if(logged){
menu.innerHTML=`
<div>Cập nhật thông tin</div>
<div>Nạp tiền</div>
<div onclick="logout()">Đăng xuất</div>
`
}else{
menu.innerHTML=`
<div onclick="showLogin()">đăng nhập</div>
<div>đăng kí</div>
`
}

menu.style.display="flex"
}

function showLogin(){
document.getElementById("overlay").style.display="block"
document.getElementById("loginPopup").style.display="block"
}

function closeAll(){
document.getElementById("overlay").style.display="none"
document.querySelectorAll(".popup").forEach(p=>p.style.display="none")
}

function login(){
let u=document.getElementById("user").value
let p=document.getElementById("pass").value

if(u=="admin" && p=="admin"){
document.getElementById("loading").style.display="flex"

let i=0
let int=setInterval(()=>{
i++
document.getElementById("bar").style.width=i+"%"
if(i>=100){
clearInterval(int)
document.cookie="user="+u
location.reload()
}
},20)

}else{
alert("tài khoản hoặc mật khẩu sai")
}
}

function logout(){
document.cookie="user=;"
location.reload()
}

function check(){
let c=document.cookie
if(c.includes("user=")){
logged=true
username=c.split("=")[1]
document.getElementById("hello").innerText="xin chào, "+username
}
}
check()

function napTien(){
document.getElementById("overlay").style.display="block"
document.getElementById("simplePopup").style.display="block"
document.getElementById("simpleText").innerText="TÍNH NĂNG SẼ ĐƯỢC ADMIN UPDATE SAU"
}

function hoTro(){
document.getElementById("overlay").style.display="block"
document.getElementById("simplePopup").style.display="block"
document.getElementById("simpleText").innerHTML=`
<div onclick="window.open('https://zalo.me/0347241585')">zalo</div>
<div onclick="window.open('https://www.facebook.com/profile.php?id=1815703088')">facebook</div>
`
}

function lichSu(){
document.getElementById("overlay").style.display="block"
document.getElementById("simplePopup").style.display="block"
document.getElementById("simpleText").innerText="Chưa có lịch sử giao dịch nào"
}

function mua(){
document.getElementById("overlay").style.display="block"
document.getElementById("buyPopup").style.display="block"
}

function tinh(){
let q=document.getElementById("qty").value
document.getElementById("total").innerText=
"Thành tiền: "+(q*10000)+"đ"
}

</script>

</body>
</html>
