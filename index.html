<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Giao diện giống hình</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
linear-gradient(120deg,#7a6a5a,#9b8b79);
}

/* bảng mạch chính */
.board{
width:900px;
height:520px;
background:#efe7d9;
border-radius:18px;
position:relative;
box-shadow:0 20px 40px rgba(0,0,0,.35);
overflow:hidden;
}

/* khung nhựa trên */
.top-cover{
position:absolute;
top:-40px;
right:40px;
width:420px;
height:180px;
background:#cfcfcf;
border-radius:14px;
box-shadow:0 10px 15px rgba(0,0,0,.25);
}

/* chip */
.chip{
position:absolute;
bottom:70px;
right:80px;
width:220px;
height:140px;
background:#111;
border-radius:10px;
box-shadow:
inset 0 0 10px rgba(255,255,255,.1),
0 10px 20px rgba(0,0,0,.3);
}

.chip:before,
.chip:after{
content:"";
position:absolute;
left:-20px;
right:-20px;
height:10px;
background:repeating-linear-gradient(
90deg,
#999 0 6px,
transparent 6px 14px
);
}

.chip:before{top:-12px;}
.chip:after{bottom:-12px;}

/* tụ điện */
.cap{
position:absolute;
width:40px;
height:60px;
background:#444;
border-radius:8px;
box-shadow:0 6px 10px rgba(0,0,0,.3);
}

.cap:nth-child(1){bottom:70px;left:60px;}
.cap:nth-child(2){bottom:70px;left:120px;}
.cap:nth-child(3){bottom:70px;left:180px;}

/* đường mạch */
.trace{
position:absolute;
background:#d9cfbf;
border-radius:6px;
}

.t1{width:200px;height:12px;top:180px;left:60px;}
.t2{width:12px;height:160px;top:180px;left:248px;}
.t3{width:160px;height:12px;top:320px;left:248px;}
.t4{width:12px;height:100px;top:320px;left:408px;}

/* lỗ ốc */
.hole{
position:absolute;
width:16px;
height:16px;
background:#bfb7a7;
border-radius:50%;
box-shadow:inset 0 0 4px rgba(0,0,0,.5);
}

.h1{top:20px;left:20px;}
.h2{top:20px;right:20px;}
.h3{bottom:20px;left:20px;}
.h4{bottom:20px;right:20px;}

.title{
position:absolute;
top:20px;
left:50%;
transform:translateX(-50%);
font-weight:bold;
color:#444;
letter-spacing:2px;
}
</style>
</head>

<body>

<div class="board">

<div class="title">MAIN BOARD</div>

<div class="top-cover"></div>

<div class="chip"></div>

<div class="cap"></div>
<div class="cap"></div>
<div class="cap"></div>

<div class="trace t1"></div>
<div class="trace t2"></div>
<div class="trace t3"></div>
<div class="trace t4"></div>

<div class="hole h1"></div>
<div class="hole h2"></div>
<div class="hole h3"></div>
<div class="hole h4"></div>

</div>

</body>
</html>
