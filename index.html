<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Click</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#0f1724;
color:#fff;
}

/* container */
.container{
width:100%;
padding:14px;
}

/* top bar */
.topbar{
background:#182334;
border-radius:8px;
padding:18px 20px;
display:flex;
align-items:center;
justify-content:space-between;
box-shadow:0 0 0 1px rgba(255,255,255,0.05) inset;
}

/* stats */
.stats{
display:flex;
gap:60px;
align-items:center;
}

.stat{
display:flex;
flex-direction:column;
gap:6px;
}

.stat span{
font-size:13px;
color:#8ea3c7;
}

.stat b{
font-size:22px;
}

/* date box */
.date{
background:#0f1724;
border:1px solid rgba(255,255,255,.1);
padding:8px 14px;
border-radius:6px;
font-size:13px;
color:#c7d2fe;
}

/* chart area */
.chart{
margin-top:10px;
height:520px;
border-radius:8px;
overflow:hidden;
position:relative;
background:#111827;
}

/* background image */
.chart img{
width:100%;
height:100%;
object-fit:cover;
opacity:.55;
}

/* overlay gradient */
.chart:after{
content:"";
position:absolute;
inset:0;
background:linear-gradient(
to bottom,
rgba(24,35,52,.7),
rgba(15,23,36,.9)
);
}

/* fake graph line */
.graph{
position:absolute;
bottom:40px;
left:0;
right:0;
height:200px;
pointer-events:none;
}

.line{
position:absolute;
bottom:0;
left:0;
width:100%;
height:100%;
}

.line svg{
width:100%;
height:100%;
}

</style>
</head>

<body>

<div class="container">

<div class="topbar">

<div class="stats">

<div class="stat">
<span>Tổng số nhấp chuột</span>
<b>67171</b>
</div>

<div class="stat">
<span>Clicks (Thời kỳ hiện tại)</span>
<b>4011</b>
</div>

<div class="stat">
<span>Clicks (Hôm nay)</span>
<b>413</b>
</div>

</div>

<div class="date">
03/19/2026 - 04/02/2026
</div>

</div>

<div class="chart">

<img src="https://images.unsplash.com/photo-1508780709619-79562169bc64?q=80&w=2070">

<div class="graph">
<div class="line">
<svg viewBox="0 0 1000 200" preserveAspectRatio="none">
<polyline
fill="none"
stroke="#4f7cff"
stroke-width="3"
points="
0,160
100,150
200,155
300,130
400,135
500,110
600,115
700,90
800,95
900,70
1000,80
"
/>
</svg>
</div>
</div>

</div>

</div>

</body>
</html>
