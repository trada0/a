<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đếm Click</title>

<style>
body{
font-family: Arial, sans-serif;
background:#f4f6fb;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:white;
padding:40px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
text-align:center;
width:300px;
}

h1{
margin-bottom:20px;
}

#count{
font-size:40px;
color:#007bff;
margin:20px 0;
}

button{
padding:12px 25px;
font-size:18px;
border:none;
border-radius:10px;
background:#007bff;
color:white;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

.reset{
margin-top:10px;
background:#ff3b3b;
}

.reset:hover{
background:#cc0000;
}
</style>
</head>

<body>

<div class="box">
<h1>Tổng Click</h1>

<div id="count">0</div>

<button onclick="addClick()">Click</button>
<br>
<button class="reset" onclick="resetClick()">Reset</button>
</div>

<script>
let count = localStorage.getItem("total_click");

if(count === null){
count = 0;
}else{
count = parseInt(count);
}

document.getElementById("count").innerText = count;

function addClick(){
count++;
localStorage.setItem("total_click", count);
document.getElementById("count").innerText = count;
}

function resetClick(){
count = 0;
localStorage.setItem("total_click", count);
document.getElementById("count").innerText = count;
}
</script>

</body>
</html>
