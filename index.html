<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bán tài khoản Facebook</title>

<style>
*{
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
margin:0;
background:#f5f5f5;
border-radius:12px;
overflow-x:hidden;
}

.header{
width:100%;
background:#e9e9e9;
text-align:center;
padding:15px;
font-size:22px;
font-weight:bold;
border-radius:0 0 12px 12px;
}

.top-bar{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 15px;
}

.menu-btn{
font-size:22px;
cursor:pointer;
}

.user-area{
display:flex;
align-items:center;
gap:10px;
position:relative;
}

.avatar{
width:40px;
height:40px;
border-radius:50%;
cursor:pointer;
}

.dropdown{
position:absolute;
top:45px;
right:0;
background:white;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
display:none;
flex-direction:column;
overflow:hidden;
}

.dropdown div{
padding:10px 20px;
cursor:pointer;
border-bottom:1px solid #eee;
}

.dropdown div:hover{
background:#f0f0f0;
}

.container{
padding:20px;
}

.post{
background:white;
border-radius:12px;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
transition:0.2s;
box-shadow:0 0 5px rgba(0,0,0,0.1);
}

.post:hover{
transform:translateY(-5px);
box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

.post-left{
max-width:70%;
}

.tag{
border:1px solid #2ecc71;
color:#2ecc71;
padding:5px 10px;
border-radius:6px;
display:inline-block;
margin-top:5px;
}

.buy-btn{
background:red;
color:white;
border:none;
padding:10px 20px;
border-radius:8px;
cursor:pointer;
}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
justify-content:center;
align-items:center;
z-index:999;
}

.popup-box{
background:white;
padding:20px;
border-radius:12px;
min-width:300px;
max-width:90%;
position:relative;
}

.close{
position:absolute;
top:-10px;
right:-10px;
background:white;
border:1px solid #ccc;
border-radius:50%;
width:30px;
height:30px;
cursor:pointer;
}

.close:hover{
background:red;
color:white;
}

input{
width:100%;
padding:10px;
margin:5px 0;
border:1px solid #ccc;
border-radius:6px;
}

.login-btn{
background:red;
color:white;
border:none;
padding:10px;
width:100%;
border-radius:6px;
cursor:pointer;
}

.menu{
position:fixed;
top:0;
left:-250px;
width:250px;
height:100%;
background:white;
box-shadow:0 0 10px rgba(0,0,0,0.3);
transition:0.3s;
padding:20px;
z-index:1000;
}

.menu div{
padding:10px;
cursor:pointer;
}

.menu div:hover{
background:#eee;
}

.loading{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:2000;
}

.progress{
width:200px;
height:10px;
background:#eee;
margin-top:10px;
border-radius:10px;
overflow:hidden;
}

.progress div{
height:100%;
width:0%;
background:#3498db;
}

</style>
</head>

<body>

<div class="loading" id="loading">
<img src="https://d2eioyamun8mp1.cloudfront.net/images/1775119223712_rUa3GTUcQ0.jpg" width="120">
<div class="progress"><div id="bar"></div></div>
</div>

<div class="header">
bán tài khoản facebook
</div>

<div class="top-bar">
<div class="menu-btn" onclick="toggleMenu()">☰</div>

<div class="user-area">
<span id="hello"></span>
<img class="avatar" onclick="toggleUser()" src="https://d2eioyamun8mp1.cloudfront.net/images/1775110178008_od0kbCwWky.jpg">
<div class="dropdown" id="dropdown"></div>
</div>
</div>

<div class="menu" id="menu">
<div onclick="location.reload()">Trang chủ</div>
<div onclick="napTien()">Nạp tiền</div>
<div onclick="hoTro()">Hỗ trợ</div>
<div onclick="lichSu()">Lịch sử giao dịch</div>
</div>

<div class="container">

<div class="post">
<div class="post-left">
<div>TÀI KHOẢN TẠO 2 THÁNG, 1K-2KFR, 2FA, MAIL NHẬN ĐƯỢC CODE</div>
<div class="tag">Số lượng: 10</div>
<div class="tag">Giá: 10000đ</div>
</div>

<button class="buy-btn" onclick="buy()">Mua ngay</button>
</div>

</div>

<div class="popup" id="loginPopup">
<div class="popup-box">
<button class="close" onclick="closePopup()">X</button>
<input id="user" placeholder="name user">
<input id="pass" type="password" placeholder="pass">
<button class="login-btn" onclick="login()">đăng nhập</button>
<div onclick="alert('chưa có')" style="cursor:pointer;margin-top:5px">đăng kí</div>
</div>
</div>

<div class="popup" id="popup"></div>

<script>

let logged = localStorage.getItem("user")

function renderUser(){
let d=document.getElementById("dropdown")
let hello=document.getElementById("hello")

if(logged){
hello.innerText="xin chào, "+logged
d.innerHTML=`
<div>Cập nhật thông tin</div>
<div>Nạp tiền</div>
<div onclick="logout()">Đăng xuất</div>
`
}else{
hello.innerText=""
d.innerHTML=`
<div onclick="showLogin()">đăng nhập</div>
<div>đăng kí</div>
`
}
}

renderUser()

function toggleUser(){
let d=document.getElementById("dropdown")
d.style.display=d.style.display=="flex"?"none":"flex"
d.style.flexDirection="column"
}

function showLogin(){
document.getElementById("loginPopup").style.display="flex"
}

function closePopup(){
document.querySelectorAll(".popup").forEach(p=>p.style.display="none")
}

function login(){
let u=user.value
let p=pass.value

if(u=="admin" && p=="admin"){
alert("đăng nhập thành công")
localStorage.setItem("user",u)
showLoading()
}else{
alert("sai tài khoản hoặc mật khẩu")
}
}

function showLoading(){
let l=document.getElementById("loading")
l.style.display="flex"

let bar=document.getElementById("bar")
let i=0

let t=setInterval(()=>{
i++
bar.style.width=i+"%"
if(i>=100){
clearInterval(t)
location.reload()
}
},10)
}

function logout(){
localStorage.removeItem("user")
location.reload()
}

function toggleMenu(){
let m=document.getElementById("menu")
m.style.left=m.style.left=="0px"?"-250px":"0px"
}

function napTien(){
showBox("TÍNH NĂNG SẼ ĐƯỢC ADMIN UPDATE SAU")
}

function lichSu(){
showBox("<h3>lịch sử giao dịch</h3><center>Chưa có lịch sử giao dịch nào</center>")
}

function hoTro(){
showBox(`
<div style="display:flex;gap:10px">
<div onclick="window.open('https://zalo.me/0347241585')" style="border:1px solid #ccc;padding:10px;border-radius:8px;cursor:pointer">
<img src="https://d2eioyamun8mp1.cloudfront.net/images/1775119223712_rUa3GTUcQ0.jpg" width=50><br>zalo
</div>

<div onclick="window.open('https://www.facebook.com/profile.php?id=1815703088')" style="border:1px solid #ccc;padding:10px;border-radius:8px;cursor:pointer">
<img src="https://d2eioyamun8mp1.cloudfront.net/images/1775119223712_rUa3GTUcQ0.jpg" width=50><br>facebook
</div>
</div>
`)
}

function showBox(html){
document.getElementById("popup").innerHTML=`
<div class="popup-box">
<button class="close" onclick="closePopup()">X</button>
${html}
</div>
`
document.getElementById("popup").style.display="flex"
}

function buy(){
showBox(`
<h3>TÀI KHOẢN TẠO 2 THÁNG, 1K-2KFR, 2FA, MAIL NHẬN ĐƯỢC CODE</h3>
Số lượng cần mua
<input id="qty" type="number" value="1" oninput="calc()">
Thành tiền
<input id="total" readonly>
<button class="login-btn">Thanh toán</button>
`)
calc()
}

function calc(){
let q=document.getElementById("qty").value
document.getElementById("total").value=(q*10000)+"đ"
}

</script>

</body>
</html>
